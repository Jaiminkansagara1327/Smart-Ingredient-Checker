name: 🐛 Bug Report
description: Report a bug to help us improve Ingrexa
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: |
        Example: The analysis fails when I enter more than 10 ingredients.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How do we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Videos (Required if UI bug)
      description: |
        Please provide images or a screen recording to help us understand the issue. 
        You can drag and drop images directly into this box.
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Browser, etc.
      placeholder: e.g. MacOS 14, Chrome 120
